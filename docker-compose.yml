version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: teencare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: tuankhoa2908
      MYSQL_DATABASE: teencare
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: teencare-api
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=teencare
      - DB_USER=root
      - DB_PASS=tuankhoa2908
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

volumes:
  mysql_data:
